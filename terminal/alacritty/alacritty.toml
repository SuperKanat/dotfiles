[general]
live_config_reload=true
import = [
	"~/.config/alacritty/themes/themes/aura.toml"
]

[env]
TERM = "xterm-256color"

[window]

padding.x = 10
padding.y = 10

dimensions.lines = 30
dimensions.columns = 90



decorations = "Full"
decorations_theme_variant = "Dark"

[font]
size = 14.0

[font.normal]
family = "HackNerdFontMono"
style = "Regular"

[font.bold]
family = "HackNerdFontMono"
style = "Bold"

[font.italic]
family = "HackNerdFontMono"
style = "Italic"

[font.bold_italic]
family = "HackNerdFontMono"
style = "Bold Italic"
